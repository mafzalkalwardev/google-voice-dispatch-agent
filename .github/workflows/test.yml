name: Tests

on:
  push:
    branches: ["main", "master", "dev"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          # Real secrets come from GitHub repository secrets.
          # Tests mock all external calls so these dummy values are safe here.
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || 'test_key_ci_placeholder' }}
          GROQ_MODEL: llama-3.3-70b-versatile
          LOOPBACK_DEVICE: CABLE Input
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ matrix.python-version }}
          path: logs/
          if-no-files-found: ignore
